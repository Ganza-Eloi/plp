<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract</title>
    <script>
        function showAlert(type, message) {
            alert(type + ': ' + message);
        }

        function handleSuccess() {
            try {
                // Logic for handling success
                showAlert('Success', 'The operation was successful!');
                setTimeout(function() {
                    window.location.href = 'success-url.html';
                }, 8000); // 8 seconds timeout
            } catch (error) {
                console.error('Error during success handling:', error);
                showAlert('Error', 'An error occurred while processing your request.');
            }
        }

        function handleError() {
            try {
                // Logic for handling error
                console.error('Error during operation.');
                showAlert('Error', 'An error occurred. Please try again.');
            } catch (error) {
                console.error('Error during error handling:', error);
            }
        }
    </script>
</head>
<body>
    <h1>Contract</h1>
    <button onclick="handleSuccess()">Simulate Success</button>
    <button onclick="handleError()">Simulate Error</button>
</body>
</html>
